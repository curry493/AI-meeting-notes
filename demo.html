<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 会议纪要 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 20px; text-align: center; }
    .input-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 14px; resize: vertical; }
    textarea:focus { outline: none; border-color: #4a90e2; }
    .btn { background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    .btn:hover { background: #357abd; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .output-section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
    .output-section.show { display: block; }
    .output-section h3 { color: #333; margin-bottom: 12px; }
    .output-content { background: #f9f9f9; border-radius: 8px; padding: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .error { background: #fee; color: #c00; padding: 12px; border-radius: 8px; margin-top: 12px; }
    .hint { color: #666; font-size: 12px; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI 会议纪要生成器</h1>
    
    <div class="input-section">
      <textarea id="inputText" placeholder="粘贴会议内容在这里..."></textarea>
      <button class="btn" id="generateBtn" onclick="generate()">生成会议纪要</button>
      <p class="hint">提示：粘贴一段会议讨论内容，然后点击生成</p>
    </div>
    
    <div class="output-section" id="outputSection">
      <h3>📋 生成的会议纪要</h3>
      <div class="output-content" id="outputContent"></div>
    </div>
  </div>

  <script>
    const inputText = document.getElementById('inputText');
    const generateBtn = document.getElementById('generateBtn');
    const outputSection = document.getElementById('outputSection');
    const outputContent = document.getElementById('outputContent');

    async function generate() {
      const text = inputText.value.trim();
      if (!text) {
        alert('请输入会议内容');
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = '生成中...';
      outputSection.classList.remove('show');
      outputContent.textContent = '';

      try {
        const response = await fetch('http://localhost:3001/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        if (data.error) {
          outputContent.innerHTML = '<div class="error">错误: ' + data.error + '</div>';
        } else {
          outputContent.textContent = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        outputContent.innerHTML = '<div class="error">无法连接到服务器，请确保已运行 node server.js</div>';
      }

      generateBtn.disabled = false;
      generateBtn.textContent = '生成会议纪要';
      outputSection.classList.add('show');
    }
  </script>
</body>
</html>
