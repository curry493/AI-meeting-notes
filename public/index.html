<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 会议纪要生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center gap-2 bg-brand-50 text-brand-600 px-4 py-1.5 rounded-full text-sm font-medium mb-4">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        AI 驱动
      </div>
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">会议纪要生成器</h1>
      <p class="text-slate-500 mt-2">粘贴会议内容，AI 自动生成结构化纪要</p>
    </header>

    <!-- Input Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
      <label class="block text-sm font-semibold text-slate-700 mb-3" for="meetingInput">
        粘贴会议内容
      </label>
      <textarea
        id="meetingInput"
        rows="8"
        placeholder="在此粘贴会议文字内容，AI 将自动分析并生成结构化的会议纪要..."
        class="w-full resize-none rounded-xl border border-slate-200 px-4 py-3 text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
      ></textarea>

      <div class="flex items-center justify-between mt-4">
        <span class="text-xs text-slate-400">Ctrl + Enter 快捷生成</span>
        <div class="flex gap-3">
          <button id="clearBtn" class="px-4 py-2 text-sm text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition">
            清空
          </button>
          <button id="generateBtn" class="inline-flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white px-6 py-2 rounded-xl text-sm font-semibold shadow-sm transition">
            <span id="btnIcon">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </span>
            <span id="btnText">生成会议纪要</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="text-center py-16">
      <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </div>
      <p class="text-slate-400 text-sm">输入会议内容即可开始生成</p>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden text-center py-16">
      <div class="inline-block w-10 h-10 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin mb-4"></div>
      <p class="text-slate-500 text-sm">AI 正在分析会议内容...</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6 mb-6">
      <div class="flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <div>
          <p class="text-red-700 font-semibold text-sm">出错了</p>
          <p id="errorMessage" class="text-red-600 text-sm mt-1"></p>
        </div>
      </div>
    </div>

    <!-- Result Content -->
    <div id="resultContent" class="hidden space-y-5">

      <!-- Topic -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2 h-2 bg-brand-500 rounded-full"></span>
          <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">主题</h2>
        </div>
        <p id="resultTopic" class="text-xl font-bold text-slate-800"></p>
      </div>

      <!-- Summary -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2 h-2 bg-amber-400 rounded-full"></span>
          <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">摘要</h2>
        </div>
        <p id="resultSummary" class="text-slate-700 leading-relaxed"></p>
      </div>

      <!-- Pending Decisions -->
      <div id="pendingDecisionsSection" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-2 h-2 bg-amber-500 rounded-full"></span>
          <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">待决事项</h2>
        </div>
        <ul id="resultPendingDecisions" class="space-y-3"></ul>
      </div>

      <!-- Decisions -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
          <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">关键决策</h2>
        </div>
        <ul id="resultDecisions" class="space-y-2"></ul>
      </div>

      <!-- Action Items -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="flex items-center gap-2 px-6 pt-6 pb-4">
          <span class="w-2 h-2 bg-violet-500 rounded-full"></span>
          <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">待办事项</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-slate-100 text-left">
                <th class="px-4 pb-3 text-slate-500 font-medium">任务</th>
                <th class="px-4 pb-3 text-slate-500 font-medium whitespace-nowrap">负责人</th>
                <th class="px-4 pb-3 text-slate-500 font-medium whitespace-nowrap">截止日期</th>
                <th class="px-4 pb-3 text-slate-500 font-medium">优先级</th>
              </tr>
            </thead>
            <tbody id="resultActions" class="divide-y divide-slate-50"></tbody>
          </table>
        </div>
        <p id="noActions" class="hidden px-6 pb-6 text-sm text-slate-400 italic">暂无待办事项</p>
      </div>

      <!-- Email Draft -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-sky-500 rounded-full"></span>
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">邮件草稿</h2>
          </div>
          <button id="copyEmailBtn" class="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-brand-600 transition">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span id="copyBtnText">复制</span>
          </button>
        </div>
        <p id="resultEmail" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap bg-slate-50 rounded-xl px-4 py-3"></p>
      </div>

    </div>

    <footer class="text-center text-xs text-slate-400 mt-10">
      由 DeepSeek AI 驱动 &middot; 本地运行，保护隐私
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
